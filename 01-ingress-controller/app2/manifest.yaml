apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  labels:
    project: roboshop
    tier: frontend
    component: app2
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      component: app2
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: app2
    spec:
      containers:
      - name: app2
        image: joindevops/app2:1.0.0
---
# Service must be NodePort -- old ALB ingress controller uses target-type: instance
# ALB registers EC2 nodes, traffic comes in on NodePort, then forwards to pod
apiVersion: v1
kind: Service
metadata:
  name: app2
spec:
  type: NodePort
  selector:
    project: roboshop
    tier: frontend
    component: app2
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
# OLD ALB Ingress Controller (before AWS Load Balancer Controller)
# Problems:
#   - target-type: instance → ALB → EC2 node (NodePort) → pod (extra hop)
#   - no group.name → every app gets its OWN ALB (expensive)
#   - v1beta1 API → removed in K8s 1.22
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: app2
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: instance
spec:
  rules:
  - host: "app2.daws88s.online"
    http:
      paths:
      - path: /
        backend:
          serviceName: app2
          servicePort: 80
